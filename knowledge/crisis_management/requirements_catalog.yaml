version: 1
domains:
  - id: org_profile
    label: Organization Profile
  - id: operations_sites
    label: Operations & Sites
  - id: governance
    label: Crisis Governance
  - id: communications
    label: Communications
  - id: risk_bcp
    label: Risk & Business Continuity

requirements:
  # --- Organization Profile ---
  - id: ORG-001
    domain: org_profile
    field_path: company_name
    label: Legal company name
    priority: critical
    intake_required: true
    unlocks_agents: [discovery, risk_profile, governance]
    why_it_matters: Establishes the legal entity scope for the crisis management plan.
    question_template: What is the full legal name of the organization (including parent/subsidiary structure if relevant)?

  - id: ORG-002
    domain: org_profile
    field_path: industry
    label: Primary industry sector
    priority: critical
    intake_required: true
    unlocks_agents: [discovery, risk_profile]
    why_it_matters: Industry determines applicable risk modifiers and regulatory context.
    question_template: What is the organization's primary industry sector and any secondary sectors?

  - id: ORG-003
    domain: org_profile
    field_path: employees
    label: Total employee count
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, governance]
    why_it_matters: Scale affects team structure, notification volumes, and resource assumptions.
    question_template: What is the total headcount (employees and contractors) globally and by major region?

  - id: ORG-004
    domain: org_profile
    field_path: legal_entities
    label: Legal entity structure
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Crisis authority and regulatory obligations vary by legal entity.
    question_template: List all legal entities (parent, subsidiaries, JVs) with country of incorporation and operational role.

  - id: ORG-005
    domain: org_profile
    field_path: countries
    label: Countries of operation
    priority: critical
    intake_required: true
    unlocks_agents: [risk_profile, governance, procedures]
    why_it_matters: Geographic footprint drives jurisdiction-specific procedures and escalation.
    question_template: In which countries does the organization have employees, facilities, or material operations?

  - id: ORG-006
    domain: org_profile
    field_path: business_model
    label: Business model summary
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile]
    why_it_matters: Revenue-critical activities inform business impact analysis.
    question_template: Briefly describe core products/services, revenue streams, and customer concentration.

  - id: ORG-007
    domain: org_profile
    field_path: regulators
    label: Primary regulators
    priority: high
    intake_required: false
    unlocks_agents: [procedures, reviewer]
    why_it_matters: Regulatory notification timelines must be embedded in procedures.
    question_template: Which regulators or authorities must be notified for incidents in each jurisdiction?

  - id: ORG-008
    domain: org_profile
    field_path: insurance_program
    label: Insurance and crisis response coverage
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Insurance carriers and brokers are often part of crisis coordination.
    question_template: Describe crisis-related insurance (property, liability, cyber, D&O) and broker/emergency contacts.

  - id: ORG-014
    domain: org_profile
    field_path: headquarters_country
    label: Headquarters country
    priority: high
    intake_required: false
    unlocks_agents: [discovery, governance, reviewer]
    why_it_matters: HQ jurisdiction drives default legal, insurance, and regulatory assumptions.
    question_template: In which country is the organization headquartered or legally domiciled?

  - id: ORG-015
    domain: org_profile
    field_path: organization_size
    label: Organization size tier
    priority: medium
    intake_required: false
    unlocks_agents: [discovery, governance]
    why_it_matters: Size tier calibrates CMT structure expectations and gap priorities.
    question_template: How would you classify organization size (small, medium, large, enterprise) if different from headcount?

  - id: ORG-016
    domain: org_profile
    field_path: crisis_program_maturity
    label: Crisis program maturity
    priority: high
    intake_required: false
    unlocks_agents: [discovery, reviewer]
    why_it_matters: Nascent programs need phased implementation; established programs need exercise and review evidence.
    question_template: Is the crisis program nascent, developing, or established? What exists today?

  - id: ORG-017
    domain: org_profile
    field_path: staffing_model
    label: Crisis staffing model
    priority: medium
    intake_required: false
    unlocks_agents: [discovery, governance]
    why_it_matters: Lean, centralized, and distributed staffing models require different escalation and alternate coverage.
    question_template: Is crisis staffing lean (dual roles), centralized at HQ, or distributed across sites/regions?

  # --- Operations & Sites ---
  - id: OPS-001
    domain: operations_sites
    field_path: sites
    label: Facility and site registry
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Site-specific activation and local emergency response require a site registry.
    question_template: Provide a registry of facilities (name, address, country, headcount, critical functions).

  - id: OPS-002
    domain: operations_sites
    field_path: critical_functions
    label: Critical business functions
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: BIA and recovery priorities depend on identified critical functions.
    question_template: What business functions cannot tolerate more than 4/24/72 hours of disruption?

  - id: OPS-003
    domain: operations_sites
    field_path: site_activation_contacts
    label: Site-level activation contacts
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Each site needs 24/7 reachable contacts for crisis activation.
    question_template: Who are the site-level crisis contacts (primary/alternate) and after-hours numbers per major site?

  - id: OPS-004
    domain: operations_sites
    field_path: shift_patterns
    label: Shift and staffing patterns
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Off-hours incidents require different notification paths.
    question_template: Describe shift patterns, weekend operations, and remote vs on-site staffing by site.

  - id: OPS-005
    domain: operations_sites
    field_path: hazmat_exposure
    label: Hazardous materials exposure
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Environmental and industrial incidents require specialized response procedures.
    question_template: Are hazardous materials stored or processed? List substances, quantities, and SDS availability.

  - id: OPS-006
    domain: operations_sites
    field_path: local_emergency_services
    label: Local emergency services contacts
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: First responders and facility emergency coordination must be pre-identified.
    question_template: For each major site, list fire, police, ambulance, and poison control numbers.

  - id: OPS-007
    domain: operations_sites
    field_path: utilities_dependencies
    label: Utilities and infrastructure dependencies
    priority: medium
    intake_required: false
    unlocks_agents: [risk_profile]
    why_it_matters: Utility failure can trigger hibernation or relocation decisions.
    question_template: What utilities (power, water, telecom) are single points of failure per site?

  - id: OPS-008
    domain: operations_sites
    field_path: third_party_operators
    label: Third-party operators on site
    priority: medium
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Contractor incidents require clear authority and notification lines.
    question_template: Which third parties operate on your sites (security, catering, logistics) and who manages them?

  - id: OPS-009
    domain: operations_sites
    field_path: travel_exposure
    label: Employee travel exposure
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Travelers abroad require separate crisis tracks from site incidents.
    question_template: How many employees travel internationally monthly and to which high-risk destinations?

  - id: OPS-010
    domain: operations_sites
    field_path: supply_chain_critical_suppliers
    label: Critical suppliers and single points of failure
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Supply chain disruption is a primary manufacturing crisis scenario.
    question_template: List tier-1 suppliers, sole-source dependencies, and alternate supplier status.
    industry_tags: [manufacturing]

  - id: OPS-011
    domain: operations_sites
    field_path: production_continuity
    label: Production continuity requirements
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Recovery time objectives for production drive crisis priorities.
    question_template: What are RTO/RPO targets for production lines and warehouse operations?
    industry_tags: [manufacturing]

  - id: OPS-012
    domain: operations_sites
    field_path: ot_ics_environment
    label: OT/ICS environment overview
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Cyber-physical incidents require distinct escalation from IT-only events.
    question_template: Describe OT/ICS systems, segmentation from IT, and who authorizes emergency shutdowns.
    industry_tags: [manufacturing]

  # --- Crisis Governance ---
  - id: GOV-001
    domain: governance
    field_path: existing_crisis_plan
    label: Existing crisis management plan
    priority: critical
    intake_required: false
    unlocks_agents: [discovery, reviewer]
    why_it_matters: Baseline assessment requires knowing what already exists.
    question_template: Do you have an existing crisis management plan? When was it last updated and approved?

  - id: GOV-002
    domain: governance
    field_path: last_tabletop_exercise
    label: Last crisis exercise date
    priority: high
    intake_required: false
    unlocks_agents: [reviewer, tabletop]
    why_it_matters: Exercise currency indicates organizational readiness.
    question_template: When was the last crisis tabletop or simulation, what scenario was used, and what were key findings?

  - id: GOV-003
    domain: governance
    field_path: crisis_team_structure
    label: Crisis Management Team structure
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: CMT roles and membership are core governance deliverables.
    question_template: Describe the Crisis Management Team — roles, named members, and alternates.

  - id: GOV-004
    domain: governance
    field_path: crisis_activation_criteria
    label: Crisis activation criteria
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Clear thresholds prevent delayed or premature activation.
    question_template: What conditions trigger formal crisis activation (fatalities, regulatory, media, operational)?

  - id: GOV-005
    domain: governance
    field_path: decision_authorities
    label: Decision authorities by crisis level
    priority: critical
    intake_required: false
    unlocks_agents: [governance]
    why_it_matters: Authority matrix prevents paralysis during high-stakes decisions.
    question_template: Who can authorize evacuation, production shutdown, media statements, and regulatory notification?

  - id: GOV-006
    domain: governance
    field_path: escalation_matrix
    label: Escalation matrix
    priority: critical
    intake_required: false
    unlocks_agents: [governance]
    why_it_matters: Time-based escalation ensures leadership engagement.
    question_template: Provide current escalation paths (who is notified, when, via what channel) by severity level.

  - id: GOV-007
    domain: governance
    field_path: crisis_levels
    label: Crisis severity levels
    priority: high
    intake_required: false
    unlocks_agents: [governance]
    why_it_matters: Tiered response requires defined severity levels.
    question_template: How do you classify incident severity today (levels 1–4 or equivalent)?

  - id: GOV-008
    domain: governance
    field_path: after_hours_escalation
    label: 24/7 escalation contacts
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Crises do not respect business hours; 24/7 reachability is essential.
    question_template: Who is on the 24/7 escalation roster and how are they reached after hours?

  - id: GOV-009
    domain: governance
    field_path: executive_succession
    label: Executive succession during crisis
    priority: high
    intake_required: false
    unlocks_agents: [governance]
    why_it_matters: Unavailability of key leaders must not halt crisis command.
    question_template: If the CEO or Crisis Director is unavailable, who assumes command?

  - id: GOV-010
    domain: governance
    field_path: board_notification
    label: Board and investor notification protocol
    priority: medium
    intake_required: false
    unlocks_agents: [governance, communications]
    why_it_matters: Material incidents may require board and investor communication.
    question_template: When and how is the board notified? Is there an investor relations crisis protocol?

  - id: GOV-011
    domain: governance
    field_path: legal_counsel_contacts
    label: Legal counsel crisis contacts
    priority: high
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Legal privilege and regulatory advice must be available immediately.
    question_template: Who is external and internal legal counsel for crisis events, and how are they reached 24/7?

  - id: GOV-012
    domain: governance
    field_path: site_crisis_leads
    label: Site crisis leads per country
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Multi-country operations need local crisis leads with defined authority.
    question_template: Who leads crisis response at each country/site level and what authority do they hold?
    industry_tags: [manufacturing]

  # --- Communications ---
  - id: COM-001
    domain: communications
    field_path: internal_comms_channels
    label: Internal crisis communication channels
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Reliable internal channels are required for CMT coordination.
    question_template: What channels are used for crisis comms (phone bridge, Teams, satellite, SMS mass notify)?

  - id: COM-002
    domain: communications
    field_path: spokesperson_policy
    label: Spokesperson and media policy
    priority: critical
    intake_required: false
    unlocks_agents: [governance, procedures]
    why_it_matters: Unauthorized statements create legal and reputational risk.
    question_template: Who is authorized to speak to media, employees, and regulators? Is there a holding statement template?

  - id: COM-003
    domain: communications
    field_path: employee_notification
    label: Employee notification procedures
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Employee safety notifications must be timely and accurate.
    question_template: How are employees notified during site emergencies, travel incidents, and all-clear events?

  - id: COM-004
    domain: communications
    field_path: family_liaison
    label: Family and next-of-kin liaison
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Serious injuries or fatalities require structured family communication.
    question_template: Is there a family liaison role and protocol for serious injuries, fatalities, or missing persons?

  - id: COM-005
    domain: communications
    field_path: social_media_monitoring
    label: Social media monitoring and response
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Crises often break on social media before official channels.
    question_template: Who monitors social media during a crisis and what is the approval flow for responses?

  - id: COM-006
    domain: communications
    field_path: customer_notification
    label: Customer and partner notification
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Supply disruption and data incidents require customer communication plans.
    question_template: How are major customers and partners notified of operational or data incidents?

  - id: COM-007
    domain: communications
    field_path: dark_website
    label: Crisis website or dark site readiness
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Public-facing crisis pages may be needed for large-scale events.
    question_template: Is a crisis/dark website available or pre-approved? Who can activate it?

  # --- Risk & Business Continuity ---
  - id: RISK-001
    domain: risk_bcp
    field_path: existing_bcp
    label: Existing business continuity plans
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, reviewer]
    why_it_matters: Crisis plans must align with or reference existing BCP.
    question_template: Do business continuity plans exist by site or function? When were they last tested?

  - id: RISK-002
    domain: risk_bcp
    field_path: risk_register
    label: Enterprise risk register
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile]
    why_it_matters: Existing risk assessments accelerate profiling.
    question_template: Is there an enterprise risk register? Can you share top 10 risks for the next 12 months?

  - id: RISK-003
    domain: risk_bcp
    field_path: historical_incidents
    label: Historical crisis and near-miss incidents
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, tabletop]
    why_it_matters: Past incidents reveal realistic scenarios and gaps.
    question_template: Describe significant incidents or near-misses in the past 3 years and lessons learned.

  - id: RISK-004
    domain: risk_bcp
    field_path: cyber_incident_playbook
    label: Cyber incident response playbook
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Cyber crises often trigger regulatory and operational cascades.
    question_template: Is there a cyber IR playbook? Who declares a cyber crisis and interfaces with IT/OT?

  - id: RISK-005
    domain: risk_bcp
    field_path: pandemic_health_plan
    label: Health emergency and pandemic plan
    priority: medium
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Health emergencies affect workforce availability across sites.
    question_template: What health emergency plans exist (pandemic, occupational illness outbreaks)?

  - id: RISK-006
    domain: risk_bcp
    field_path: data_backup_recovery
    label: Data backup and recovery capabilities
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Recovery depends on tested backup and restoration procedures.
    question_template: What are RPO/RTO for critical systems and when were restores last tested?

  - id: RISK-007
    domain: risk_bcp
    field_path: alternate_work_locations
    label: Alternate work and recovery sites
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Relocation and hibernation decisions need pre-identified alternatives.
    question_template: What alternate sites or work-from-home capacity exists if primary sites are unavailable?

  - id: RISK-008
    domain: risk_bcp
    field_path: civil_unrest_exposure
    label: Civil unrest and security threat exposure
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Multi-country footprint may include unrest-prone locations.
    question_template: Which operating locations have elevated security threats (unrest, crime, terrorism)?

  - id: RISK-009
    domain: risk_bcp
    field_path: natural_hazard_exposure
    label: Natural hazard exposure by site
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Site-specific hazards drive scenario planning.
    question_template: What natural hazards affect each site (flood, earthquake, cyclone, wildfire)?

  - id: RISK-010
    domain: risk_bcp
    field_path: industrial_accident_scenarios
    label: Industrial accident scenarios
    priority: critical
    intake_required: false
    unlocks_agents: [risk_profile, procedures, tabletop]
    why_it_matters: Manufacturing clients require fire, explosion, and chemical release scenarios.
    question_template: What industrial accident scenarios have been assessed (fire, explosion, chemical release)?
    industry_tags: [manufacturing]

  - id: RISK-011
    domain: risk_bcp
    field_path: environmental_liability
    label: Environmental liability and spill response
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Environmental incidents trigger regulatory and community response.
    question_template: Who manages environmental spill response and regulator notification?
    industry_tags: [manufacturing]

  - id: RISK-012
    domain: risk_bcp
    field_path: labor_industrial_relations
    label: Labor and industrial relations risks
    priority: medium
    intake_required: false
    unlocks_agents: [risk_profile]
    why_it_matters: Strikes and labor disputes can disrupt operations and require crisis governance.
    question_template: Are there active or historical labor disputes at any site? What is the escalation path?
    industry_tags: [manufacturing]

  # --- Organization Profile (extended) ---
  - id: ORG-009
    domain: org_profile
    field_path: public_listing
    label: Public listing and market exposure
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, communications]
    why_it_matters: Listed companies face disclosure obligations and market sensitivity during crises.
    question_template: Is the organization publicly listed? On which exchanges and under what disclosure rules?

  - id: ORG-010
    domain: org_profile
    field_path: key_customers
    label: Key customer concentration
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Customer concentration affects crisis communication and business impact severity.
    question_template: Which customers represent significant revenue concentration and require priority notification?

  - id: ORG-011
    domain: org_profile
    field_path: data_privacy_program
    label: Data privacy and protection program
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Data incidents require GDPR/CCPA and breach notification procedures.
    question_template: Describe data privacy governance, DPO contacts, and breach notification obligations.

  - id: ORG-012
    domain: org_profile
    field_path: union_presence
    label: Union and collective bargaining presence
    priority: medium
    intake_required: false
    unlocks_agents: [risk_profile, governance]
    why_it_matters: Unionized workforces require distinct communication and escalation paths during labor crises.
    question_template: Which sites or regions have union representation and active collective agreements?

  - id: ORG-013
    domain: org_profile
    field_path: csr_esg_contacts
    label: CSR and ESG crisis contacts
    priority: medium
    intake_required: false
    unlocks_agents: [communications]
    why_it_matters: ESG-related incidents attract stakeholder and media scrutiny beyond operational impact.
    question_template: Who manages CSR/ESG communications and stakeholder engagement during reputational crises?

  # --- Operations & Sites (extended) ---
  - id: OPS-013
    domain: operations_sites
    field_path: cloud_dependencies
    label: Cloud and SaaS dependencies
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile, procedures]
    why_it_matters: Cloud outages can disable crisis tools and business-critical applications simultaneously.
    question_template: Which critical systems depend on cloud/SaaS providers and what are failover arrangements?

  - id: OPS-014
    domain: operations_sites
    field_path: physical_security
    label: Physical security perimeters
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Perimeter breaches and active threats require coordinated security and CMT response.
    question_template: Describe physical security controls, guard force, and lockdown procedures per major site.

  - id: OPS-015
    domain: operations_sites
    field_path: emergency_evacuation
    label: Emergency evacuation procedures
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Evacuation decisions must be pre-planned with assembly points and accountability processes.
    question_template: What evacuation routes, assembly points, and headcount verification procedures exist per site?

  - id: OPS-016
    domain: operations_sites
    field_path: mutual_aid
    label: Mutual aid and mutual assistance agreements
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Neighboring facilities and industry peers may provide emergency support during major incidents.
    question_template: Are mutual aid agreements in place with neighboring facilities or industry peers?

  - id: OPS-017
    domain: operations_sites
    field_path: business_hours_coverage
    label: Business hours and timezone coverage
    priority: medium
    intake_required: false
    unlocks_agents: [governance]
    why_it_matters: Global operations span time zones; crisis command coverage must be defined.
    question_template: What business hours and timezone coverage exist for crisis leadership across regions?

  - id: OPS-022
    domain: operations_sites
    field_path: access_control_systems
    label: Access control and badge systems
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Lockdown and access revocation are common crisis actions at secured facilities.
    question_template: How are access control systems managed during lockdown or credential compromise events?

  - id: OPS-023
    domain: operations_sites
    field_path: single_points_of_failure
    label: Operational single points of failure
    priority: high
    intake_required: false
    unlocks_agents: [risk_profile]
    why_it_matters: Identifying SPOFs informs prioritization during cascading failures.
    question_template: What operational single points of failure have been identified across sites and functions?

  - id: OPS-024
    domain: operations_sites
    field_path: remote_workforce
    label: Remote and hybrid workforce
    priority: medium
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Remote workers require different notification and welfare check procedures during crises.
    question_template: What percentage of staff work remotely and how are they reached during site-level emergencies?

  # --- Crisis Governance (extended) ---
  - id: GOV-013
    domain: governance
    field_path: post_incident_review
    label: Post-incident review process
    priority: high
    intake_required: false
    unlocks_agents: [reviewer]
    why_it_matters: Lessons learned and corrective actions close the crisis management loop.
    question_template: Is there a post-incident review process? Who leads it and within what timeframe?

  - id: GOV-014
    domain: governance
    field_path: insurance_claims
    label: Insurance claims coordination
    priority: high
    intake_required: false
    unlocks_agents: [procedures]
    why_it_matters: Property and liability claims must be initiated promptly to preserve coverage.
    question_template: Who coordinates insurance claims during a crisis and what documentation is required?

  - id: GOV-015
    domain: governance
    field_path: crisis_tools
    label: Crisis management tools and systems
    priority: medium
